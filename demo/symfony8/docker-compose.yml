name: beacon-bundle-demo-symfony-8
services:
  php:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: beacon-demo-symfony8-php
    working_dir: /app
    ports:
      - "${PORT:-8011}:80"
    volumes:
      - .:/app
      - ../..:/var/beacon-bundle
      - ./docker/frankenphp/Caddyfile.dev:/etc/frankenphp/Caddyfile.dev
      - ./docker/php-dev.ini:/usr/local/etc/php/conf.d/99-dev.ini:ro
      - composer-cache:/root/.composer/cache
    environment:
      - COMPOSER_ALLOW_SUPERUSER=1
      - APP_ENV=dev
      - APP_DEBUG=1
      - APP_SECRET=${APP_SECRET:-demo-secret}
    # Reach Symfony Beacon published on the host (HTTP :9081 / HTTPS :9444).
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # Mitigate Docker/WSL DNS failures resolving repo.packagist.org (composer curl error 6).
    dns:
      - 8.8.8.8
      - 8.8.4.4
    networks:
      - beacon-demo-network

volumes:
  composer-cache:
    driver: local

networks:
  beacon-demo-network:
    driver: bridge
