# nowo-tech/beacon-bundle
# Point BEACON_DSN at any Symfony Beacon instance (domain / subdomain / port).
# Empty DSN disables reporting.
#
# Format: https://PUBLIC_KEY@host:port/PROJECT_ID
# Example (local Beacon): https://9cb5e28adc3ed7a40052e2a17e327220@localhost:9444/1
nowo_beacon:
    enabled: true
    dsn: '%env(string:default::BEACON_DSN)%'
    environment: '%kernel.environment%'
    # release: '%env(default::BEACON_RELEASE)%'
    verify_peer: true
    register_error_listener: true
    ignore_exceptions:
        - InvalidArgumentException

when@dev:
    nowo_beacon:
        # Local Beacon often uses self-signed TLS on :9444; HTTP :9081 needs no TLS.
        verify_peer: false
        send:
            user: true
